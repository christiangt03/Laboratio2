name: Reusable Node CI
 
on:
  workflow_call:
    inputs:
      node-version:
        description: 'Versión de Node.js (ej. "18", "20", "22")'
        required: true
        type: string
      working-directory:
        description: 'Directorio del proyecto Node'
        required: false
        type: string
        default: '.'
      run-tests:
        description: 'Ejecutar los tests'
        required: false
        type: boolean
        default: true
      build-script:
        description: 'Script npm para el build'
        required: false
        type: string
        default: 'build'
    outputs:
      test-result:
        description: 'passed | failed | skipped'
        value: ${{ jobs.build-test.outputs.test-result }}
      artifact-name:
        description: 'Nombre del artifact de build publicado'
        value: ${{ jobs.build-test.outputs.artifact-name }}
      cache-hit:
        description: 'true si las dependencias se restauraron de cache'
        value: ${{ jobs.build-test.outputs.cache-hit }}
 
# Parte 5 — Seguridad: principio de mínimo privilegio
permissions:
  contents: read
 
jobs:
  build-test:
    runs-on: ubuntu-22.04
    outputs:
      test-result: ${{ steps.test.outputs.result }}
      artifact-name: ${{ steps.set-artifact.outputs.name }}
      cache-hit: ${{ steps.cache-npm.outputs.cache-hit }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
 
      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ inputs.node-version }}
 
      # ───── Parte 2 — Cache ─────
      - name: Restore npm cache
        id: cache-npm
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.npm
            ${{ inputs.working-directory }}/node_modules
          key: ${{ runner.os }}-node${{ inputs.node-version }}-npm-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-node${{ inputs.node-version }}-npm-
 
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
 
      - name: Run tests
        id: test
        if: ${{ inputs.run-tests }}
        run: |
          mkdir -p reports
          if npm test 2>&1 | tee reports/test-output.log; then
            echo "result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
 
      - name: Skip tests marker
        if: ${{ !inputs.run-tests }}
        run: echo "result=skipped" >> "$GITHUB_OUTPUT"
 
      - name: Build
        run: npm run ${{ inputs.build-script }}
 
      # ───── Parte 3 — Artifacts ─────
      - name: Compute artifact name
        id: set-artifact
        run: echo "name=build-node${{ inputs.node-version }}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
 
      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ steps.set-artifact.outputs.name }}
          path: ${{ inputs.working-directory }}/dist
          retention-days: 14
          if-no-files-found: error
 
      - name: Upload test report
        if: always() && inputs.run-tests
        uses: actions/upload-artifact@v4.6.2
        with:
          name: test-report-node${{ inputs.node-version }}-${{ github.run_number }}
          path: ${{ inputs.working-directory }}/reports/
          retention-days: 7
          if-no-files-found: warn
 
      - name: Upload logs (only on failure)
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: logs-node${{ inputs.node-version }}-${{ github.run_number }}
          path: |
            ${{ inputs.working-directory }}/reports/test-output.log
            ${{ inputs.working-directory }}/npm-debug.log*
          retention-days: 30
          if-no-files-found: ignore
